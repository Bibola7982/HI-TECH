<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Follow Me</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
      overflow: hidden;
    }

    /* overlay */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: fadeIn 1.5s ease;
    }

    h1 {
      color: #fff;
      margin-bottom: 25px;
      animation: slideDown 1s ease;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px 0;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-size: 16px;
      transition: 0.3s;
      transform: scale(0.9);
      animation: popUp 0.6s ease forwards;
    }

    .btn i { font-size: 18px; }

    .instagram { background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af); }
    .facebook { background: #1877f2; }
    .youtube { background: #ff0000; }
    .twitter { background: #1da1f2; }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(255,255,255,0.3);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes popUp {
      to { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Follow Me 🚀</h1>

  <a class="btn instagram" href="https://www.instagram.com/hitechmobile77?igsh=czhzMGxtam56ZXJv" target="_blank">
    <i class="fab fa-instagram"></i> Instagram
  </a>

  <a class="btn facebook" href="https://www.facebook.com/share/1BgjXc38y1/" target="_blank">
    <i class="fab fa-facebook"></i> Facebook
  </a>

  <a class="btn youtube" href="https://www.youtube.com/@NaveenTechWala" target="_blank">
    <i class="fab fa-youtube"></i> YouTube
  </a>

  <a class="btn twitter" href="#" target="_blank">
    <i class="fab fa-twitter"></i> Twitter
  </a>
</div>

<script>
  // Click animation + sound effect
  const buttons = document.querySelectorAll('.btn');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      btn.style.transform = "scale(0.9)";
      setTimeout(() => {
        btn.style.transform = "scale(1)";
      }, 150);
    });
  });

  // Page load animation
  window.onload = () => {
    document.querySelector('.container').style.transform = 'scale(1)';
  };
</script>

</body>
</html>
