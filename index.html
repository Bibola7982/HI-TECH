<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitech Mobile Repair</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Hitech <span>Mobile</span></div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Mobile Repair in 60 Minutes</h1>
    <p>iPhone • Samsung • Vivo • Oppo • Realme</p>
</section>

<!-- POPULAR MODELS -->
<section class="section">
    <h2>Popular Models</h2>

    <div class="model-list">
        <button onclick="quickSearch('iPhone 13')">iPhone 13</button>
        <button onclick="quickSearch('iPhone 14')">iPhone 14</button>
        <button onclick="quickSearch('Samsung S21')">S21</button>
        <button onclick="quickSearch('Vivo V25')">Vivo V25</button>
        <button onclick="quickSearch('Oppo A78')">Oppo A78</button>
        <button onclick="quickSearch('Realme Narzo')">Realme</button>
    </div>
</section>

<!-- SEARCH -->
<section class="section">
    <h2>Find Repair Price</h2>
    <input type="text" id="search" placeholder="Type phone model...">
    <div id="results" class="grid"></div>
</section>

<!-- BOOK -->
<section class="section dark">
    <h2>Book Repair</h2>

    <form id="form">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="phone" placeholder="Phone" required>
        <input type="text" id="model" placeholder="Model" required>
        <textarea id="issue" placeholder="Problem"></textarea>
        <button>Book on WhatsApp</button>
    </form>
</section>

<!-- CONTACT -->
<section class="section contact">
    <h2>Contact</h2>
    <p>📍 Near Auto Market, Hansi</p>

    <div class="btns">
        <a href="tel:8607777717">Call</a>
        <a href="https://wa.me/918607777717">WhatsApp</a>
    </div>
</section>

<!-- FLOATING -->
<a href="https://wa.me/918607777717" class="float">💬</a>

<script src="script.js"></script>
</body>
</html>
