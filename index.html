<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitech Mobile & Repair</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Hitech <span>Mobile</span></div>
    <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#repair">Repair</a></li>
        <li><a href="#booking">Book</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><button id="theme-toggle"><i class="fas fa-moon"></i></button></li>
    </ul>
</nav>

<!-- HERO -->
<section id="home" class="hero">
    <div class="hero-content">
        <h1>Fast Mobile Repair</h1>
        <p>iPhone | Samsung | Xiaomi Repair in 60 Minutes</p>
        <a href="#booking" class="btn-primary">Book Now</a>
    </div>
</section>

<!-- REPAIR SEARCH -->
<section id="repair" class="section">
    <h2>Repair Price Finder</h2>
    <input type="text" id="search" placeholder="Enter phone model...">
    <div id="results"></div>
</section>

<!-- BOOKING -->
<section id="booking" class="section">
    <h2>Book Repair</h2>
    <form id="form">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="text" id="model" placeholder="Phone Model" required>
        <textarea id="issue" placeholder="Problem"></textarea>
        <button type="submit">Book via WhatsApp</button>
    </form>
</section>

<!-- CONTACT -->
<section class="contact-section" id="contact">
    <h2>Contact Us</h2>
    <p><i class="fas fa-map-marker-alt"></i> Hansi, Haryana</p>
    <p><i class="fas fa-clock"></i> 9 AM – 9 PM</p>

    <div class="contact-buttons">
        <a href="tel:8607777717" class="btn call">Call</a>
        <a href="https://wa.me/918607777717" class="btn whatsapp">WhatsApp</a>
        <a href="#" class="btn map">Directions</a>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Hitech Mobile Repair</p>
</footer>

<!-- FLOATING BUTTON -->
<a href="https://wa.me/918607777717" class="floating-wa">
    <i class="fab fa-whatsapp"></i>
</a>

<script src="script.js"></script>
</body>
</html>
